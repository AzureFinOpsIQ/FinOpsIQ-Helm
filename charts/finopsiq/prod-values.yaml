environment:
  name: prod
  namespace: finopsiq-prod

workloadIdentity:
  tenantId: "22dc2419-3ab3-4f27-905a-945315d19d95"

config:
  secretName: finopsiq-prod-app-config
  keyVaultName: kv-finopsiq-prod
  env:
    AZURE_TENANT_ID: "22dc2419-3ab3-4f27-905a-945315d19d95"
    STORAGE_PROVIDER: cosmos
    STORAGE_DATA_DIR: /tmp/finopsiq/storage
    DATA_RAW_DIR: /tmp/finopsiq/raw
    DATA_PROCESSED_DIR: /tmp/finopsiq/processed
    DATA_EMBEDDINGS_DIR: /tmp/finopsiq/embeddings
    COSMOS_ENDPOINT: "https://cosmos-finopsiq-prod.documents.azure.com:443/"
    COSMOS_DATABASE: finopsiq
    SERVICE_BUS_NAMESPACE: "sb-finopsiq-prod.servicebus.windows.net"
    SERVICE_BUS_TOPIC: finops-events
    EVENT_PROVIDER: service_bus
    AZURE_STORAGE_ACCOUNT_URL: "https://stfinopsiqprod.blob.core.windows.net/"
    AZURE_STORAGE_CONTAINER: finops-raw
    USE_MANAGED_IDENTITY: "true"
    AUTH_MODE: entra
    ENTRA_CLIENT_ID: ""
    COLLECTION_ENTRA_CLIENT_ID: ""
    ENTRA_AUTHORITY: "https://login.microsoftonline.com/22dc2419-3ab3-4f27-905a-945315d19d95"
    ENTRA_REDIRECT_URI: "https://azurefinopsiq.site/auth/callback"
    ENTRA_POST_LOGOUT_REDIRECT_URI: "https://azurefinopsiq.site/"
    API_CORS_ORIGINS: "https://azurefinopsiq.site"
    FRONTEND_URL: "https://azurefinopsiq.site"
    APPLICATIONINSIGHTS_CONNECTION_STRING: ""
    KEY_VAULT_URL: "https://kv-finopsiq-prod.vault.azure.net/"
    INTERNAL_API_AUDIENCE: api://azure-cost-advisor-services
    AZURE_OPENAI_ENDPOINT: "https://oai-finopsiq-prod.openai.azure.com/"
    AZURE_OPENAI_DEPLOYMENT_NAME: gpt-4.1-mini
    AZURE_OPENAI_EMBEDDING_DEPLOYMENT: text-embedding-3-small
    AZURE_SEARCH_ENDPOINT: "https://search-finopsiq-prod.search.windows.net"
    AZURE_SEARCH_INDEX_NAME: finops-knowledge
    AZURE_SEARCH_SEMANTIC_CONFIG: finops-semantic

ingress:
  enabled: true
  className: azure-application-gateway
  hostname: azurefinopsiq.site
  sslCertificateName: ""
  sslRedirect: true

services:
  frontend:
    image:
      repository: acrfinopsiqprod.azurecr.io/finopsiq/frontend
      tag: prod
    serviceAccountClientId: ""
    env:
      NEXT_PUBLIC_API_URL: "https://azurefinopsiq.site/api"
  apiGateway:
    image:
      repository: acrfinopsiqprod.azurecr.io/finopsiq/api-gateway
      tag: prod
    serviceAccountClientId: ""
  auth:
    image:
      repository: acrfinopsiqprod.azurecr.io/finopsiq/auth-service
      tag: prod
    serviceAccountClientId: ""
  collection:
    image:
      repository: acrfinopsiqprod.azurecr.io/finopsiq/collection-service
      tag: prod
    serviceAccountClientId: ""
  processing:
    image:
      repository: acrfinopsiqprod.azurecr.io/finopsiq/processing-service
      tag: prod
    serviceAccountClientId: ""
  ai:
    image:
      repository: acrfinopsiqprod.azurecr.io/finopsiq/ai-service
      tag: prod
    serviceAccountClientId: ""
  notification:
    image:
      repository: acrfinopsiqprod.azurecr.io/finopsiq/notification-service
      tag: prod
    serviceAccountClientId: ""
