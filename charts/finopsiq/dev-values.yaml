environment:
  name: dev
  namespace: finopsiq-dev

config:
  secretName: finopsiq-dev-app-config

ingress:
  enabled: true
  className: azure-application-gateway
  hostname: ""
  sslCertificateName: ""
  sslRedirect: false

services:
  frontend:
    image:
      repository: acrfinopsiqdev.azurecr.io/finopsiq/frontend
      tag: dev
    env:
      NEXT_PUBLIC_API_URL: ""
  apiGateway:
    image:
      repository: acrfinopsiqdev.azurecr.io/finopsiq/api-gateway
      tag: dev
  auth:
    image:
      repository: acrfinopsiqdev.azurecr.io/finopsiq/auth-service
      tag: dev
  collection:
    image:
      repository: acrfinopsiqdev.azurecr.io/finopsiq/collection-service
      tag: dev
  processing:
    image:
      repository: acrfinopsiqdev.azurecr.io/finopsiq/processing-service
      tag: dev
  ai:
    image:
      repository: acrfinopsiqdev.azurecr.io/finopsiq/ai-service
      tag: dev
  notification:
    image:
      repository: acrfinopsiqdev.azurecr.io/finopsiq/notification-service
      tag: dev
