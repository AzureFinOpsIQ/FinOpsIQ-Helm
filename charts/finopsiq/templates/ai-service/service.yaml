apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: {{ .Values.environment.namespace | quote }}
  labels:
    app.kubernetes.io/name: finopsiq
    app.kubernetes.io/component: ai-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: finopsiq
    app.kubernetes.io/component: ai-service
  ports:
    - name: http
      port: 8000
      targetPort: http
