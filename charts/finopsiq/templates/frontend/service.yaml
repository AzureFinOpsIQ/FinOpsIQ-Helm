apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.environment.namespace | quote }}
  labels:
    app.kubernetes.io/name: finopsiq
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: finopsiq
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
