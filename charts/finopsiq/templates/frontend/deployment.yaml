apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.environment.namespace | quote }}
  labels:
    app.kubernetes.io/name: finopsiq
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: finopsiq
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finopsiq
        app.kubernetes.io/component: frontend
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: frontend
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- if and .Values.config.csi.enabled .Values.config.keyVaultName .Values.services.frontend.serviceAccountClientId }}
      volumes:
        - name: app-config-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ printf "%s-frontend" .Values.config.secretProviderClassPrefix | quote }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ required "services.frontend.image.repository is required" .Values.services.frontend.image.repository }}:{{ .Values.services.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- if and .Values.config.csi.enabled .Values.config.keyVaultName .Values.services.frontend.serviceAccountClientId }}
          volumeMounts:
            - name: app-config-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.services.frontend.port }}
          env:
{{ include "finopsiq.commonEnv" . | indent 12 }}
{{ include "finopsiq.workloadIdentityEnv" (dict "clientId" .Values.services.frontend.serviceAccountClientId) | indent 12 }}
            - name: NEXT_PUBLIC_API_URL
              value: {{ .Values.services.frontend.env.NEXT_PUBLIC_API_URL | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
