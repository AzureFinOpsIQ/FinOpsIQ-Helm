apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.environment.namespace | quote }}
  labels:
    app.kubernetes.io/name: finopsiq
    app.kubernetes.io/component: api-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: finopsiq
    app.kubernetes.io/component: api-gateway
  ports:
    - name: http
      port: 8000
      targetPort: http
