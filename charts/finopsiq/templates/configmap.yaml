apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "finopsiq.configMapName" . | quote }}
  namespace: {{ .Values.environment.namespace | quote }}
  labels:
    app.kubernetes.io/name: finopsiq
    app.kubernetes.io/component: shared-config
data:
{{- range $name, $value := .Values.config.env }}
  {{ $name }}: {{ $value | quote }}
{{- end }}
