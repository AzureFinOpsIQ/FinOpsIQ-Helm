apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: {{ .Values.environment.namespace | quote }}
  labels:
    app.kubernetes.io/name: finopsiq
    app.kubernetes.io/component: auth-service
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: finopsiq
      app.kubernetes.io/component: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finopsiq
        app.kubernetes.io/component: auth-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: auth-service
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- if and .Values.config.csi.enabled .Values.config.keyVaultName .Values.services.auth.serviceAccountClientId }}
      volumes:
        - name: app-config-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ printf "%s-auth-service" .Values.config.secretProviderClassPrefix | quote }}
      {{- end }}
      containers:
        - name: auth-service
          image: "{{ required "services.auth.image.repository is required" .Values.services.auth.image.repository }}:{{ .Values.services.auth.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- if and .Values.config.csi.enabled .Values.config.keyVaultName .Values.services.auth.serviceAccountClientId }}
          volumeMounts:
            - name: app-config-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.services.auth.port }}
          envFrom:
            - secretRef:
                name: {{ .Values.config.secretName | quote }}
          env:
            - name: SERVICE_MODULE
              value: {{ .Values.services.auth.serviceModule | quote }}
            - name: USE_MANAGED_IDENTITY
              value: "true"
            - name: COLLECTION_SERVICE_URL
              value: {{ .Values.config.serviceUrls.collectionServiceUrl | quote }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
