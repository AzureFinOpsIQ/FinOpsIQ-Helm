{{- if and .Values.workloadIdentity.enabled .Values.config.csi.enabled .Values.config.keyVaultName }}
{{- $root := . }}
{{- $services := dict
  "frontend" .Values.services.frontend.serviceAccountClientId
  "api-gateway" .Values.services.apiGateway.serviceAccountClientId
  "auth-service" .Values.services.auth.serviceAccountClientId
  "collection-service" .Values.services.collection.serviceAccountClientId
  "processing-service" .Values.services.processing.serviceAccountClientId
  "ai-service" .Values.services.ai.serviceAccountClientId
  "notification-service" .Values.services.notification.serviceAccountClientId
}}
{{- range $serviceName, $clientId := $services }}
{{- if $clientId }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ printf "%s-%s" $root.Values.config.secretProviderClassPrefix $serviceName | quote }}
  namespace: {{ $root.Values.environment.namespace | quote }}
  labels:
    app.kubernetes.io/name: finopsiq
    app.kubernetes.io/component: {{ $serviceName | quote }}
spec:
  provider: azure
  secretObjects:
    - secretName: {{ $root.Values.config.secretName | quote }}
      type: Opaque
      data:
        {{- range $root.Values.config.secretKeys }}
        - objectName: {{ replace "_" "-" . | quote }}
          key: {{ . | quote }}
        {{- end }}
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ $clientId | quote }}
    keyvaultName: {{ $root.Values.config.keyVaultName | quote }}
    tenantId: {{ $root.Values.workloadIdentity.tenantId | quote }}
    objects: |
      array:
        {{- range $root.Values.config.secretKeys }}
        - |
          objectName: {{ replace "_" "-" . }}
          objectType: secret
        {{- end }}
{{- end }}
{{- end }}
{{- end }}
