name: AKS Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to deploy.
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  contents: read
  id-token: write

jobs:
  aks-deploy:
    name: Reusable Helm AKS Deploy
    uses: AzureFinOpsIQ/FinOPsIQ-Workflows/.github/workflows/helm-aks-deploy.yml@main
    with:
      environment: ${{ inputs.environment }}
      chart_path: charts/finopsiq
      release_name: finopsiq
      aks_resource_group: ${{ vars.AKS_RESOURCE_GROUP }}
      aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}
    secrets:
      azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
